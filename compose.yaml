services:
  text-diff:
    image: ghcr.io/furkansahin16/text-diff:${TEXT_DIFF_VERSION:?set TEXT_DIFF_VERSION}
    container_name: text-diff
    restart: unless-stopped
    environment:
      VERSION: ${TEXT_DIFF_VERSION:?set TEXT_DIFF_VERSION}
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
